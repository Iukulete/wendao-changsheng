name: Windows Build

on:
  push:
    branches:
      - main
      - content-opening-menu-polish
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Add MinGW to PATH
        shell: pwsh
        run: echo "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build game
        shell: cmd
        run: |
          build.bat > build.log 2>&1
          set BUILD_EXIT=%ERRORLEVEL%
          type build.log
          exit /b %BUILD_EXIT%

      - name: Agent bridge playthrough
        shell: pwsh
        env:
          WENDAO_AGENT_MAX_STEPS: "1800"
          WENDAO_AGENT_MAX_SECONDS: "720"
        run: |
          python tools/agent_playthrough.py release

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wendao-build-log
          path: build.log
          if-no-files-found: warn

      - name: Upload agent playthrough report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wendao-agent-playthrough-report
          path: |
            release/agent_playthrough_report.txt
            release/agent_trace.log
            release/agent_state.json
            release/agent_command.txt
          if-no-files-found: warn

      - name: Upload Daozu smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wendao-daozu-smoke-report
          path: release/dao_smoke_result.txt
          if-no-files-found: warn

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: wendao-windows-build
          path: release/
          if-no-files-found: error
