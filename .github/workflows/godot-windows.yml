name: Godot Windows Release

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-export:
    name: Validate and export Godot 4.7.1
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce Godot-only source boundary
        shell: pwsh
        run: |
          $legacy = git ls-files | Where-Object {
            $_ -match '(?i)(^|/)(CMakeLists\.txt|Makefile|.*\.(c|cc|cpp|cxx|h|hh|hpp|hxx|rc))$' -or
            $_ -match '(?i)^\.github/workflows/(story-art-validation|windows-build(-v06)?)\.yml$'
          }
          if ($legacy) { throw "Legacy Win32/C++ runtime or CI returned: $($legacy -join ', ')" }

      - name: Cache verified Godot archives and templates
        uses: actions/cache@v4
        with:
          path: |
            tools/godot/4.7.1/Godot_v4.7.1-stable_win64.exe.zip
            tools/godot/4.7.1/Godot_v4.7.1-stable_export_templates.tpz
          key: godot-4.7.1-windows-c7a28905-templates-86409db6

      - name: Prepare pinned official Godot environment
        shell: pwsh
        run: ./tools/prepare_godot.ps1

      - name: Verify Godot art inventory
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: python -X utf8 ./tools/verify_godot_art.py

      - name: Validate project and load main scene
        shell: pwsh
        run: ./tools/verify_godot.ps1 -NoPrepare -RequireFinalAudio

      - name: Validate rendered gameplay states
        shell: pwsh
        run: ./tools/verify_render.ps1

      - name: Export Windows x86_64 release
        shell: pwsh
        # GitHub-hosted Windows runners do not expose a stable physical audio
        # endpoint. Final audio, decoding, gameplay and rendering are gated
        # above; hardware-backed WASAPI remains mandatory for ProductRelease.
        run: ./tools/build_godot.ps1 -NoPrepare -SkipVerify -SkipAudioDeviceSmoke

      - name: Verify release boundary
        shell: pwsh
        run: |
          $output = "release/godot/windows"
          if (-not (Test-Path "$output/wendao-changsheng.exe")) { throw "Windows executable missing" }
          if (-not (Test-Path "$output/wendao-changsheng.pck")) { throw "Godot resource pack missing" }
          $unexpected = Get-ChildItem $output -Recurse -File | Where-Object {
            $_.Name -match '\.cpp$|\.h$|\.obj$'
          }
          if ($unexpected) { throw "Non-Godot source leaked into the release artifact: $($unexpected.FullName -join ', ')" }

      - name: Upload Godot-only Windows build
        uses: actions/upload-artifact@v4
        with:
          name: wendao-changsheng-4.7.1-windows-x86_64
          path: release/godot/windows/
          if-no-files-found: error
          retention-days: 14
