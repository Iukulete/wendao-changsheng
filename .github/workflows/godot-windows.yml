name: Godot Windows Release

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  # Feature-branch pushes keep the full Godot regression signal while the
  # product-art gate stays authoritative for main and pull requests.
  PRODUCT_RELEASE: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

jobs:
  validate-and-export:
    name: Validate and export Godot 4.7.1
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce Godot-only source boundary
        shell: pwsh
        run: |
          $legacy = git ls-files | Where-Object {
            $_ -match '(?i)(^|/)(CMakeLists\.txt|Makefile|.*\.(c|cc|cpp|cxx|h|hh|hpp|hxx|rc))$' -or
            $_ -match '(?i)^\.github/workflows/(story-art-validation|windows-build(-v06)?)\.yml$'
          }
          if ($legacy) { throw "Legacy Win32/C++ runtime or CI returned: $($legacy -join ', ')" }

      - name: Cache verified Godot archives and templates
        uses: actions/cache@v4
        with:
          path: |
            tools/godot/4.7.1/Godot_v4.7.1-stable_win64.exe.zip
            tools/godot/4.7.1/Godot_v4.7.1-stable_export_templates.tpz
          key: godot-4.7.1-windows-c7a28905-templates-86409db6

      - name: Prepare pinned official Godot environment
        shell: pwsh
        run: ./tools/prepare_godot.ps1

      - name: Verify Godot art inventory
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: python -X utf8 ./tools/verify_godot_art.py

      - name: Validate project and load main scene
        shell: pwsh
        run: |
          $verifyParameters = @{ NoPrepare = $true }
          if ($env:PRODUCT_RELEASE -eq "true") {
            $verifyParameters.RequireFinalAudio = $true
            $verifyParameters.RequireProductArt = $true
            Write-Host "Product release gates enabled for this ref."
          } else {
            Write-Host "Development branch validation enabled; product-art gate remains deferred to main/PR."
          }
          ./tools/verify_godot.ps1 @verifyParameters

      - name: Validate rendered gameplay states
        shell: pwsh
        run: ./tools/verify_render.ps1

      - name: Install pinned virtual WASAPI validation endpoint
        shell: pwsh
        timeout-minutes: 5
        run: |
          # VB-CABLE is third-party donationware fetched from its official
          # origin (https://vb-audio.com/Cable/). It is CI infrastructure only
          # and is never bundled into the game or uploaded artifact.
          $url = "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack45.zip"
          $expectedArchiveHash = "B950E39F01AF1D04EA623C8F6D8EB9B6EA5C477C637295FABF20631C85116BFB"
          $expectedSetupSigner = "A77952D93229D0EC36E2543081EEA7D125732B9C"
          $expectedCatalogSigner = "9A4A6CFEE73C6B65945FCAA083DFBCC1E9077E7E"
          $archive = Join-Path $env:RUNNER_TEMP "VBCABLE_Driver_Pack45.zip"
          $driverDir = Join-Path $env:RUNNER_TEMP "VBCABLE_Driver_Pack45"
          Invoke-WebRequest -UseBasicParsing -Uri $url -OutFile $archive
          $archiveHash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash
          if ($archiveHash -ne $expectedArchiveHash) {
            throw "VB-CABLE archive hash mismatch: $archiveHash"
          }
          Expand-Archive -LiteralPath $archive -DestinationPath $driverDir
          $setup = Join-Path $driverDir "VBCABLE_Setup_x64.exe"
          $catalog = Join-Path $driverDir "vbaudio_cable64_win10.cat"
          $setupSignature = Get-AuthenticodeSignature -LiteralPath $setup
          $catalogSignature = Get-AuthenticodeSignature -LiteralPath $catalog
          if ($setupSignature.Status -ne "Valid" -or
              $setupSignature.SignerCertificate.Thumbprint -ne $expectedSetupSigner) {
            throw "VB-CABLE setup signature is not the pinned publisher signature."
          }
          if ($catalogSignature.Status -ne "Valid" -or
              $catalogSignature.SignerCertificate.Thumbprint -ne $expectedCatalogSigner) {
            throw "VB-CABLE catalog signature is not the pinned Microsoft hardware signature."
          }
          $installer = Start-Process -FilePath $setup -ArgumentList "-i", "-h" `
            -WindowStyle Hidden -PassThru -Wait
          if ($installer.ExitCode -ne 0) {
            throw "VB-CABLE installation failed with exit code $($installer.ExitCode)."
          }
          pnputil /scan-devices
          Stop-Service Audiosrv -Force -ErrorAction SilentlyContinue
          Restart-Service AudioEndpointBuilder -Force
          Start-Service Audiosrv
          $deadline = (Get-Date).AddSeconds(60)
          do {
            $endpoint = Get-PnpDevice -Class AudioEndpoint -ErrorAction SilentlyContinue |
              Where-Object { $_.FriendlyName -like "CABLE Input*" } |
              Select-Object -First 1
            if (-not $endpoint) { Start-Sleep -Seconds 2 }
          } until ($endpoint -or (Get-Date) -ge $deadline)
          if (-not $endpoint) {
            Get-PnpDevice -Class Media -ErrorAction SilentlyContinue | Format-Table -AutoSize
            Get-PnpDevice -Class AudioEndpoint -ErrorAction SilentlyContinue | Format-Table -AutoSize
            throw "The pinned CI audio driver installed but exposed no active render endpoint."
          }
          Write-Host "Virtual WASAPI render endpoint enumerated: $($endpoint.FriendlyName) [$($endpoint.Status)]"

      - name: Export Windows x86_64 release
        shell: pwsh
        run: |
          if ($env:PRODUCT_RELEASE -eq "true") {
            ./tools/build_godot.ps1 -NoPrepare -SkipVerify -ProductRelease
          } else {
            ./tools/build_godot.ps1 -NoPrepare -SkipVerify
          }

      - name: Verify release boundary
        shell: pwsh
        run: |
          $output = "release/godot/windows"
          if (-not (Test-Path "$output/wendao-changsheng.exe")) { throw "Windows executable missing" }
          if (-not (Test-Path "$output/wendao-changsheng.pck")) { throw "Godot resource pack missing" }
          $unexpected = Get-ChildItem $output -Recurse -File | Where-Object {
            $_.Name -match '\.cpp$|\.h$|\.obj$'
          }
          if ($unexpected) { throw "Non-Godot source leaked into the release artifact: $($unexpected.FullName -join ', ')" }

      - name: Upload Godot-only Windows build
        uses: actions/upload-artifact@v4
        with:
          name: wendao-changsheng-4.7.1-windows-x86_64
          path: release/godot/windows/
          if-no-files-found: error
          retention-days: 14
